<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- PWA 與 iOS 支援 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="自由美利堅">
    <meta name="theme-color" content="#007AFF">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <link rel="manifest" href="manifest.json">
    
    <title>2026 自由美利堅</title>

    <!-- CSS 引用 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    
    <!-- JS 外部套件 -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="safe-top">

    <!-- 載入動畫 -->
    <div id="loading-screen" class="fixed inset-0 bg-[#F2F2F7] flex flex-col items-center justify-center z-[2500]">
        <div class="w-10 h-10 border-[4px] border-blue-600 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="text-[11px] font-black text-slate-400 tracking-widest uppercase">Connecting to USA Cloud</p>
    </div>

    <!-- 同步狀態提示 -->
    <div id="save-status" class="fixed top-10 left-1/2 -translate-x-1/2 bg-black text-white px-6 py-2.5 rounded-full text-[10px] font-black z-[3000] hidden shadow-2xl">同步中...</div>

    <!-- 彈窗系統：攻略 -->
    <div id="guide-modal" class="modal-overlay" onclick="ui.closeModal('guide-modal')">
        <div class="modal-box" onclick="event.stopPropagation()">
            <div class="modal-drag-handle" style="width: 36px; height: 5px; background: #E5E5EA; border-radius: 10px; position: absolute; top: 10px; left: 50%; transform: translateX(-50%);"></div>
            <div class="modal-header-fixed">
                <button onclick="ui.closeModal('guide-modal')" class="text-slate-400 p-1 active:scale-90 transition-all"><i data-lucide="x"></i></button>
                <h3 class="text-sm font-black text-slate-900">攻略詳細內容</h3><div class="w-8"></div> 
            </div>
            <div id="guide-modal-content" class="modal-content-scroll bg-[#F2F2F7]/50"></div>
        </div>
    </div>

    <!-- 彈窗系統：個人分析 -->
    <div id="personal-stats-modal" class="modal-overlay" onclick="ui.closeModal('personal-stats-modal')">
        <div class="modal-box" onclick="event.stopPropagation()">
            <div class="modal-header-fixed">
                <button onclick="ui.closeModal('personal-stats-modal')" class="text-slate-400"><i data-lucide="x"></i></button>
                <h3 class="text-sm font-black text-slate-900">個人分析詳情</h3><div class="w-8"></div> 
            </div>
            <div class="modal-content-scroll bg-[#F2F2F7]/50">
                <div class="analyze-header-section text-center bg-white p-6 rounded-3xl shadow-sm">
                    <div class="chart-container" style="max-width: 150px; margin: 0 auto 20px auto;"><canvas id="personal-chart"></canvas></div>
                    <div id="stat-totals-container" class="mt-4 text-center"></div>
                </div>
                <h4 class="text-[11px] font-black text-slate-400 uppercase tracking-widest mt-6 mb-4 px-1">個人消費明細</h4>
                <div id="personal-item-list" class="pb-10"></div>
            </div>
        </div>
    </div>

    <!-- 彈窗系統：票券預覽 -->
    <div id="ticket-detail-modal" class="modal-overlay" onclick="ui.closeModal('ticket-detail-modal')">
        <div class="modal-box" onclick="event.stopPropagation()">
            <div class="modal-header-fixed">
                <button onclick="ui.closeModal('ticket-detail-modal')" class="text-slate-400"><i data-lucide="x"></i></button>
                <h3 id="td-title" class="text-sm font-black text-slate-900">票券圖片預覽</h3><div class="w-8"></div>
            </div>
            <div class="modal-content-scroll">
                <div id="td-container" class="space-y-6">
                    <div id="td-image-area" class="hidden"><img id="td-image" class="w-full rounded-2xl shadow-lg border border-slate-100" src="" loading="lazy"></div>
                    <div><label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">備註</label><p id="td-note" class="text-slate-800 text-sm mt-2 white-space-pre-wrap"></p></div>
                    <div id="td-attach-box" class="hidden"><label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">連結</label><a id="td-link" href="#" target="_blank" class="block bg-blue-50 p-4 rounded-xl text-blue-600 font-bold text-xs mt-2 truncate">查看票券連結</a></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 彈窗系統：票券編輯 -->
    <div id="ticket-edit-modal" class="modal-overlay" onclick="ui.closeModal('ticket-edit-modal')">
        <div class="modal-box" onclick="event.stopPropagation()">
            <div class="modal-header-fixed">
                <button onclick="ui.closeModal('ticket-edit-modal')" class="text-slate-400"><i data-lucide="x"></i></button>
                <h3 id="ticket-modal-title" class="text-sm font-black text-slate-900">票券編輯</h3><div class="w-8"></div>
            </div>
            <div class="modal-content-scroll">
                <div class="space-y-4">
                    <div class="image-upload-box" id="tk-image-box">
                        <i data-lucide="paperclip" class="w-8 h-8 mb-2"></i>
                        <span class="text-xs font-bold" id="upload-status-text">上傳票券附件</span>
                        <input type="file" id="tk-image-input" accept="image/*" onchange="ui.handleTicketImage(event)">
                        <img id="tk-image-render" class="hidden absolute inset-0 w-full h-full object-cover" src="">
                        <div id="tk-remove-img" class="hidden remove-img-btn" onclick="ui.clearTicketImage(event)"><i data-lucide="trash-2" class="w-4 h-4 text-white"></i></div>
                    </div>
                    <input type="text" id="tk-title" class="input-pill" placeholder="票券名稱">
                    <textarea id="tk-note" class="input-pill min-h-[100px] resize-none" placeholder="備註內容..."></textarea>
                    <input type="text" id="tk-attachment" class="input-pill" placeholder="連結 (選填)">
                </div>
            </div>
            <div class="modal-footer-fixed">
                <div id="delete-tk-btn" onclick="logic.deleteTicket()" class="delete-btn-text text-[#FF3B30] font-bold py-2 cursor-pointer mb-2 text-center">刪除票券</div>
                <button id="save-tk-btn" onclick="logic.submitTicket()" class="w-full py-4 rounded-2xl bg-blue-600 text-white font-black shadow-xl active:scale-95 text-sm uppercase transition-all">儲存票券</button>
            </div>
        </div>
    </div>

    <!-- 彈窗系統：美金結算建議 -->
    <div id="settlement-advice-modal" class="modal-overlay" onclick="ui.closeModal('settlement-advice-modal')">
        <div class="modal-box" onclick="event.stopPropagation()">
            <div class="modal-drag-handle" style="width: 36px; height: 5px; background: #E5E5EA; border-radius: 10px; position: absolute; top: 10px; left: 50%; transform: translateX(-50%);"></div>
            <div class="modal-header-fixed">
                <button onclick="ui.closeModal('settlement-advice-modal')" class="text-slate-400"><i data-lucide="x"></i></button>
                <h3 class="text-sm font-black text-slate-900">美金結算建議</h3><div class="w-8"></div>
            </div>
            <div id="settlement-advice-content" class="modal-content-scroll bg-[#F2F2F7]/50"></div>
        </div>
    </div>

    <!-- 彈窗系統：支出紀錄 -->
    <div id="expense-modal" class="modal-overlay" onclick="ui.closeModal('expense-modal')">
        <div class="modal-box" onclick="event.stopPropagation()">
            <div class="modal-header-fixed">
                <button onclick="ui.closeModal('expense-modal')" class="text-slate-400"><i data-lucide="x"></i></button>
                <h3 id="expense-modal-title" class="text-sm font-black text-slate-900">支出紀錄</h3><div class="w-8"></div>
            </div>
            <div class="modal-content-scroll no-scrollbar">
                <div class="space-y-4">
                    <input type="text" id="exp-title" class="input-pill" placeholder="項目名稱">
                    <select id="exp-category" class="input-pill"></select>
                    <div class="grid grid-cols-1 gap-4">
                        <input type="number" id="exp-amount" class="input-pill" placeholder="金額 (USD)" inputmode="decimal">
                        <input type="hidden" id="exp-currency" value="USD">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase">付款人</label><div id="payer-list" class="flex flex-wrap gap-2 mt-2"></div>
                        <label class="text-[10px] font-black text-slate-400 uppercase mt-4 block">分攤者</label><div id="part-list" class="flex flex-wrap gap-2 mt-2"></div>
                    </div>
                </div>
            </div>
            <div class="modal-footer-fixed">
                <div id="delete-exp-btn" onclick="logic.deleteExpense()" class="delete-btn-text text-[#FF3B30] font-bold py-2 cursor-pointer mb-2 text-center">刪除支出</div>
                <button onclick="logic.submitExpense()" class="w-full py-4 rounded-2xl bg-blue-600 text-white font-black shadow-xl active:scale-95 text-sm uppercase transition-all">儲存支出</button>
            </div>
        </div>
    </div>

    <div id="app">
        <!-- 頂部 Header -->
        <header id="main-header" class="glass-header">
            <div id="header-itinerary" class="view-header">
                <div class="header-main-row"><h1 class="text-[20px] font-black text-slate-900">2026 自由美利堅 ✨</h1></div>
                <div id="date-picker" class="date-picker-scroll no-scrollbar md:justify-center"></div>
            </div>
            <div id="header-expenses" class="view-header hidden">
                <div class="header-main-row">
                    <h1 class="text-[20px] font-black text-slate-900">分帳總覽 💸</h1>
                    <button onclick="ui.showSettlementAdvice()" class="bg-blue-600 text-white px-4 py-2 rounded-xl text-[10px] font-black shadow-lg active:scale-95 transition-all flex items-center gap-2">
                        <i data-lucide="refresh-cw" class="w-3 h-3"></i> 結算建議
                    </button>
                </div>
            </div>
            <div id="header-tickets" class="view-header hidden">
                <div class="header-main-row"><h1 class="text-[20px] font-black text-slate-900">我的票券 🎟️</h1></div>
            </div>
        </header>

        <!-- 主內容視圖 -->
        <main>
            <section id="view-itinerary" class="view-section">
                <div class="content-container px-6 mt-6 pb-32">
                    <div id="day-banner" class="banner-dark shadow-xl mb-8 relative overflow-hidden rounded-[28px] p-6 text-white" style="background: linear-gradient(145deg, #111827, #1f2937);">
                        <span id="display-day-badge" class="bg-blue-600/30 text-blue-400 px-2.5 py-0.5 rounded-full text-[9px] font-black uppercase mb-3 inline-block tracking-widest">DAY 1</span>
                        <h2 id="day-title-inner" class="text-2xl font-black mb-1.5 leading-tight">載入中...</h2>
                        <p id="day-route-path" class="text-slate-400 text-xs font-bold flex items-center gap-1.5 opacity-80"></p>
                    </div>
                    <div id="itinerary-list" class="space-y-0 relative"></div>
                </div>
            </section>

            <section id="view-expenses" class="view-section hidden">
                <div class="content-container px-6 mt-6 pb-32">
                    <div class="mb-10">
                        <h3 class="text-[11px] font-black text-slate-400 uppercase tracking-widest mb-4 px-1">成員數據總覽</h3>
                        <div id="settlement-summary" class="flex gap-4 overflow-x-auto no-scrollbar pb-4 -mx-1 px-1"></div>
                    </div>
                    <div class="space-y-4">
                        <div class="flex justify-between items-end px-1 border-b border-slate-100 pb-3 mb-2">
                            <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest flex items-center gap-2"><i data-lucide="list" class="w-3 h-3"></i> 支出明細</h3>
                            <span id="total-count" class="text-[10px] font-bold text-slate-300">0 項</span>
                        </div>
                        <div id="expense-list" class="flex flex-col gap-1.5"></div>
                    </div>
                </div>
            </section>

            <section id="view-tickets" class="view-section hidden">
                <div class="content-container px-6 pt-6 pb-32"><div id="ticket-list" class="flex flex-col gap-3"></div></div>
            </section>
        </main>

        <!-- 底部導航欄 -->
        <footer class="glass-nav safe-bottom">
            <div class="content-container flex">
                <div onclick="ui.switchView('itinerary')" class="nav-card active" id="nav-itinerary"><i data-lucide="map"></i><span class="text-[9px] font-black uppercase">行程</span></div>
                <div onclick="ui.switchView('expenses')" class="nav-card" id="nav-expenses"><i data-lucide="wallet"></i><span class="text-[9px] font-black uppercase">分帳</span></div>
                <div onclick="ui.switchView('tickets')" class="nav-card" id="nav-tickets"><i data-lucide="ticket"></i><span class="text-[9px] font-black uppercase">票券</span></div>
            </div>
        </footer>
    </div>

    <!-- 懸浮按鈕 -->
    <button id="fab-expense" onclick="ui.showExpenseModal()" class="fab-button"><i data-lucide="plus"></i></button>
    <button id="fab-ticket" onclick="ui.showTicketModal()" class="fab-button"><i data-lucide="plus"></i></button>

    <script type="module" src="script.js"></script>
    <script>
        // PWA 註冊邏輯
        // 使用 try-catch 與安全性檢查，避免在不支援 Service Worker 的預覽環境中崩潰
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                // 只有在 HTTPS 或 localhost 環境下嘗試註冊
                if (window.location.protocol === 'https:' || window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
                    navigator.serviceWorker.register('service-worker.js', { scope: './' })
                        .then(reg => console.log('Service Worker 註冊成功', reg.scope))
                        .catch(err => {
                            console.warn('Service Worker 註冊失敗，但在預覽環境這通常是正常的：', err);
                        });
                }
            });
        }
    </script>
</body>
</html>
